<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3 de Febrero Stream — Panel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Oswald:wght@400;600;700&family=Bebas+Neue&family=Montserrat:wght@400;600;700;800&family=Barlow+Condensed:wght@400;600;700&family=Poppins:wght@400;600;700&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#070e2a;--panel:#0c1838;--border:#162a6a;--blueL:#2b6dd6;--blueB:#4a8eef;--muted:#4466aa;--text:#c8d8f0;--white:#fff;--red:#cc3344;--green:#22aa66}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Header */
.hdr{padding:12px 14px 8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--blueB),var(--blueL));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr small{font-size:10px;color:var(--muted)}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tabs button{flex:1;padding:9px 0;font-size:11px;font-weight:600;background:none;border:none;cursor:pointer;color:var(--muted);font-family:inherit;border-bottom:2px solid transparent;transition:.15s}
.tabs button.on{color:var(--white);border-bottom-color:var(--blueL)}

/* Cards */
.card{background:var(--panel);border:1px solid var(--border);border-radius:8px;margin:6px 10px;overflow:hidden;transition:border-color .15s}
.card:hover{border-color:var(--blueL)}
.card-head{display:flex;align-items:center;gap:8px;padding:8px 10px}
.card-head .icon{font-size:16px}
.card-head .info{flex:1;min-width:0}
.card-head .name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-head .sub{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-preview{height:80px;background:repeating-conic-gradient(var(--bg) 0% 25%,#060c22 0% 50%) 0 0/12px 12px;position:relative;overflow:hidden;border-top:1px solid var(--border)}
.card-preview iframe{width:1920px;height:1080px;border:none;background:transparent;transform-origin:0 0;pointer-events:none;position:absolute;top:0;left:0}
.card-actions{display:flex;gap:4px;padding:6px 10px;border-top:1px solid var(--border);background:rgba(0,0,0,.15)}
.btn-s{padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;transition:.15s;display:flex;align-items:center;gap:4px}
.btn-s:hover{border-color:var(--blueL);color:var(--blueL)}
.btn-s.live{border-color:var(--green);color:var(--green);background:rgba(34,170,102,.08)}
.btn-s.danger{border-color:var(--red);color:var(--red)}
.btn-s.danger:hover{background:rgba(204,51,68,.08)}

/* Editor */
.editor{padding:10px}
.ed-back{background:none;border:none;color:var(--blueL);font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;padding:4px 0;margin-bottom:8px}
.ed-preview{border-radius:8px;background:repeating-conic-gradient(var(--bg) 0% 25%,#060c22 0% 50%) 0 0/14px 14px;border:1px solid var(--border);overflow:hidden;height:130px;position:relative;margin-bottom:10px}
.ed-preview iframe{width:1920px;height:1080px;border:none;background:transparent;transform-origin:0 0;pointer-events:none;position:absolute;top:0;left:0}
.ed-preview .replay{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);border:1px solid #333;border-radius:5px;padding:2px 8px;color:#ccc;font-size:10px;cursor:pointer;font-family:inherit}
.sub-tabs{display:flex;gap:0;margin-bottom:10px;border-bottom:1px solid var(--border)}
.sub-tabs button{flex:1;padding:8px 0;font-size:10px;font-weight:600;background:none;border:none;cursor:pointer;color:var(--muted);font-family:inherit;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.5px;transition:.15s}
.sub-tabs button.on{color:var(--white);border-bottom-color:var(--blueL)}

/* Form fields */
.fld{margin-bottom:10px}
.fld label{display:block;font-size:10px;color:var(--muted);letter-spacing:.6px;font-weight:600;margin-bottom:3px;text-transform:uppercase}
.fld input[type=text],.fld textarea,.fld select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:7px 10px;color:#eee;font-size:12px;outline:none;font-family:inherit}
.fld textarea{resize:vertical}
.fld select{cursor:pointer}
.fld input[type=range]{width:100%;accent-color:var(--blueL);margin-top:2px}
.fld .rng-h{display:flex;justify-content:space-between}
.fld .rng-h span{font-size:10px;color:var(--muted)}
.fld .rng-v{font-size:10px;color:var(--blueB);font-weight:600}
.fld .rng-num{display:flex;align-items:center;gap:2px;font-size:10px;color:var(--blueB);font-weight:600}
.num-row{display:flex;align-items:center;gap:4px}
.num-free{width:80px;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:7px 10px;color:var(--blueB);font-size:13px;font-weight:600;font-family:inherit;outline:none;text-align:right}
.num-free:focus{border-color:var(--blueL)}
.num-unit{font-size:11px;color:var(--muted);font-weight:600;min-width:16px}
.num-input{width:48px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 4px;color:var(--blueB);font-size:10px;font-weight:600;font-family:inherit;outline:none;text-align:right;-moz-appearance:textfield}
.num-input::-webkit-inner-spin-button,.num-input::-webkit-outer-spin-button{opacity:1;height:14px}
.num-input:focus{border-color:var(--blueL)}
.preset-bar{display:flex;gap:6px;padding:6px 10px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.preset-bar button{padding:5px 10px;border-radius:5px;background:var(--panel);border:1px solid var(--border);color:var(--text);font-size:10px;cursor:pointer;font-family:inherit;font-weight:600;transition:.15s}
.preset-bar button:hover{border-color:var(--blueL)}
.preset-bar button.active{border-color:var(--blueB);color:var(--blueB)}
.preset-tag{font-size:9px;color:var(--muted);margin-left:4px}
.news-src{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:4px 10px;border-radius:7px;background:var(--panel);border:1px solid var(--border)}
.news-src input[type=checkbox]{accent-color:var(--blueL);width:14px;height:14px}
.news-src .info{flex:1;font-size:11px;font-weight:500}
.colors{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.colors label{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;color:var(--text)}
.colors input[type=color]{width:24px;height:24px;border:1px solid var(--border);border-radius:5px;padding:0;background:none;cursor:pointer}
.chk{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:12px;color:var(--text)}
.chk input{accent-color:var(--blueL);width:14px;height:14px}
.sep{font-size:10px;color:var(--muted);letter-spacing:.8px;font-weight:600;margin:12px 0 6px;text-transform:uppercase}

/* Add + Export */
.add-row{display:flex;gap:6px;padding:6px 10px}
.add-row button{flex:1;padding:8px 4px;border-radius:6px;background:var(--panel);border:1px solid var(--border);color:var(--text);font-size:10px;cursor:pointer;font-family:inherit;font-weight:600;transition:.15s}
.add-row button:hover{border-color:var(--blueL)}
.btn-main{display:block;width:calc(100% - 20px);margin:8px 10px;padding:12px;border-radius:8px;background:linear-gradient(135deg,var(--blueL),#1a3fa0);border:none;color:var(--white);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .1s}
.btn-main:active{transform:scale(.98)}

/* Social */
.soc-card{display:flex;align-items:center;gap:8px;padding:8px 10px;margin:4px 10px;border-radius:7px;background:var(--panel);border:1px solid var(--border);transition:opacity .15s}
.soc-card.off{opacity:.4}
.soc-card input[type=text]{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:6px 8px;color:#eee;font-size:12px;outline:none;font-family:inherit}
.soc-preview{margin:8px 10px;border-radius:8px;background:repeating-conic-gradient(var(--bg) 0% 25%,#060c22 0% 50%) 0 0/12px 12px;border:1px solid var(--border);padding:12px;display:flex;justify-content:flex-end;min-height:44px;position:relative}
.soc-item{display:flex;align-items:center;gap:8px;padding:6px 14px 6px 10px;border-radius:6px;font-weight:600;white-space:nowrap}
.soc-ctrl{display:flex;gap:6px;padding:6px 10px;align-items:center}
@keyframes socPop{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="hdr">
  <div><h1>3 de Febrero Stream</h1><small>Panel de control</small></div>
  <button class="btn-s" onclick="hideAllZocalos()" title="Ocultar todo al aire">✕ OFF</button>
</div>
<div class="tabs">
  <button id="tab-z" class="on" onclick="switchTab('z')">Zócalos</button>
  <button id="tab-f" onclick="switchTab('f')">Redes</button>
  <button id="tab-m" onclick="switchTab('m')">Mosca</button>
  <button id="tab-r" onclick="switchTab('r')">Reloj</button>
</div>
<div id="app"></div>

<script>
// ═══════════════════════════════
// CONSTANTS
// ═══════════════════════════════
var FONTS=[
  {n:'Oswald',i:'Oswald:wght@400;600;700'},
  {n:'Bebas Neue',i:'Bebas+Neue'},
  {n:'Montserrat',i:'Montserrat:wght@400;600;700;800'},
  {n:'Barlow Condensed',i:'Barlow+Condensed:wght@400;600;700'},
  {n:'Poppins',i:'Poppins:wght@400;600;700'},
  {n:'Raleway',i:'Raleway:wght@400;600;700'}
];
var ANIMS=[{id:'slideLeft',l:'Deslizar izquierda'},{id:'slideRight',l:'Deslizar derecha'},{id:'slideBottom',l:'Deslizar abajo'},{id:'slideTop',l:'Deslizar arriba'},{id:'fadeIn',l:'Fade in'},{id:'expandCenter',l:'Expandir centro'},{id:'expandLeft',l:'Expandir izquierda'},{id:'bounceIn',l:'Rebote'},{id:'zoomIn',l:'Zoom'},{id:'flipX',l:'Voltear horizontal'},{id:'flipY',l:'Voltear vertical'},{id:'wipeLeft',l:'Barrido izquierda'},{id:'wipeRight',l:'Barrido derecha'},{id:'elastic',l:'Elástico'},{id:'glitch',l:'Glitch'}];
var POSITIONS_X=[{id:'left',l:'Izquierda'},{id:'center',l:'Centro'},{id:'right',l:'Derecha'}];
var POSITIONS_Y=[{id:'bottom',l:'Abajo'},{id:'top',l:'Arriba'}];
var bc=new BroadcastChannel('3df-stream');

// ═══════════════════════════════
// HELPERS
// ═══════════════════════════════
function uid(){return Math.random().toString(36).slice(2,8)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function hrgba(h,a){if(!h||h.length<7)return'rgba(0,0,0,'+a+')';return'rgba('+parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16)+','+a+')'}
function fi(name){var f=FONTS.find(function(x){return x.n===name});return f?f.i:FONTS[0].i}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}

// ═══════════════════════════════
// STATE
// ═══════════════════════════════
function makeZ(type){
  var base={font:'Montserrat',animation:'slideLeft',duration:0.6,accentColor:'#2b6dd6',accentWidth:4,showAccent:true,
    posX:'left',posY:'bottom',offsetX:40,offsetY:60,bgOpacity:1,borderRadius:0,shadow:false,shadowColor:'#000000',shadowBlur:12,glow:false,glowColor:'#2b6dd6',glowSize:8,backdropBlur:6,
    heightMode:'auto',customHeight:60,textAlign:'left'};
  if(type==='nameRole')return Object.assign({},base,{tag:'ENTREVISTA',tagPos:'left',tagFontSize:14,showTag:true,name:'Nombre Apellido',nameFontSize:28,role:'Cargo / Descripción',roleFontSize:16,tagBg:'#1a3fa0',tagText:'#fff',mainBg:'#0d1b3e',mainText:'#fff'});
  if(type==='title')return Object.assign({},base,{tag:'EN VIVO',tagPos:'left',tagFontSize:14,showTag:true,text:'TÍTULO DEL SEGMENTO',titleSize:36,subtitle:'',subtitleSize:15,showSubtitle:true,tagBg:'#1a3fa0',tagText:'#fff',mainBg:'#0d1b3e',mainText:'#fff',font:'Oswald',animation:'expandCenter',widthMode:'auto',customWidth:700});
  return Object.assign({},base,{text:'Texto del ticker de noticias +++',bgColor:'#0d1b3e',textColor:'#fff',speed:30,tickerFontSize:18,posX:'left',posY:'bottom',offsetX:0,offsetY:0});
}

var S={
  tab:'z',editId:null,editSub:'content',
  zocalos:[{id:uid(),type:'nameRole',config:makeZ('nameRole'),live:false},{id:uid(),type:'title',config:makeZ('title'),live:false}],
  socials:[{id:'ig',label:'Instagram',handle:'@3defebrero.stream',on:true},{id:'x',label:'X',handle:'@3defebrerostream',on:true},{id:'wa',label:'WhatsApp',handle:'+54 11 0000-0000',on:false},{id:'web',label:'Web',handle:'3defebrerostream.com',on:true}],
  filmCfg:{showTime:3,fadeTime:0.5,bg:'#0d1b3e',text:'#ffffff',opacity:0.85,fontSize:15,iconSize:18,top:30,right:40,animIn:'slideInUp',animOut:'slideOutUp',durIn:0.4,durOut:0.3,shake:true},
  filminaLive:false,filminaAuto:true,
  moscaItems:[{id:uid(),text:'3 de Febrero Stream',type:'text'},{id:uid(),text:'Programa',type:'text'}],
  moscaCfg:{top:20,right:20,size:80,interval:8,opacity:0.7,textSize:14,textColor:'#ffffff'},
  moscaLive:false,
  clockCfg:{top:28,offsetX:140,posX:'right',fontSize:14,textColor:'#ffffff',bg:'#0d1b3e',opacity:0.7},
  clockLive:false,
  liveCfg:{top:28,offsetX:40,posX:'right',fontSize:12,bg:'rgba(204,20,20,0.9)',text:'EN VIVO'},
  liveLive:false,
  socialIdx:0,
  conductorItems:[],
  presets:[],
  defaultPreset:null,
  newsSources:[
    {id:'clarin_ultimas',name:'Lo Último',rss:'https://www.clarin.com/rss/lo-ultimo/',on:false},
    {id:'clarin_politica',name:'Política',rss:'https://www.clarin.com/rss/politica/',on:false},
    {id:'clarin_mundo',name:'Mundo',rss:'https://www.clarin.com/rss/mundo/',on:false},
    {id:'clarin_sociedad',name:'Sociedad',rss:'https://www.clarin.com/rss/sociedad/',on:false},
    {id:'clarin_policiales',name:'Policiales',rss:'https://www.clarin.com/rss/policiales/',on:false},
    {id:'clarin_rural',name:'Rural',rss:'https://www.clarin.com/rss/rural/',on:false},
    {id:'clarin_economia',name:'Economía',rss:'https://www.clarin.com/rss/economia/',on:false},
    {id:'clarin_internacional',name:'Internacional',rss:'https://www.clarin.com/rss/internacional/',on:false},
    {id:'clarin_futbol',name:'Fútbol',rss:'https://www.clarin.com/rss/deportes/',on:false}
  ],
  newsCustomUrls:[]
};

function save(){try{localStorage.setItem('3df_state',JSON.stringify({z:S.zocalos,s:S.socials,fc:S.filmCfg,fa:S.filminaAuto,mi:S.moscaItems,mc:S.moscaCfg,cc:S.clockCfg,lc:S.liveCfg,pr:S.presets,dp:S.defaultPreset,ns:S.newsSources,ncu:S.newsCustomUrls}))}catch(e){}}
function load(){try{var d=JSON.parse(localStorage.getItem('3df_state'));if(d){if(d.z)S.zocalos=d.z;if(d.s)S.socials=d.s;if(d.fc)S.filmCfg=Object.assign(S.filmCfg,d.fc);if(d.fa!==undefined)S.filminaAuto=d.fa;if(d.mi)S.moscaItems=d.mi;if(d.mc)S.moscaCfg=Object.assign(S.moscaCfg,d.mc);if(d.cc)S.clockCfg=Object.assign(S.clockCfg,d.cc);if(d.lc)S.liveCfg=Object.assign(S.liveCfg,d.lc);if(d.pr)S.presets=d.pr;if(d.dp!==undefined)S.defaultPreset=d.dp;if(d.ns)S.newsSources=d.ns;if(d.ncu)S.newsCustomUrls=d.ncu}}catch(e){}}
load();
// ═══════════════════════════════
// HTML GENERATORS (for overlay)
// ═══════════════════════════════
function posCSS(c,type){
  var s='position:fixed;';
  if(type==='ticker'){s+='bottom:'+c.offsetY+'px;left:0;width:100vw;';return s}
  if(c.posY==='bottom')s+='bottom:'+c.offsetY+'px;';else s+='top:'+c.offsetY+'px;';
  if(c.posX==='left')s+='left:'+c.offsetX+'px;';
  else if(c.posX==='right')s+='right:'+c.offsetX+'px;';
  else s+='left:50%;transform:translateX(-50%);';
  return s;
}
function effectCSS(c){
  var s='';
  if(c.borderRadius)s+='border-radius:'+c.borderRadius+'px;overflow:hidden;';
  if(c.shadow)s+='box-shadow:0 4px '+c.shadowBlur+'px '+hrgba(c.shadowColor,.5)+';';
  if(c.glow)s+='box-shadow:'+(c.shadow?'0 4px '+c.shadowBlur+'px '+hrgba(c.shadowColor,.5)+',':'')+'0 0 '+c.glowSize+'px '+c.glowColor+',0 0 '+(c.glowSize*2)+'px '+hrgba(c.glowColor,.4)+';';
  return s;
}

function tagAlignCSS(pos){
  if(pos==='center')return 'text-align:center;';
  if(pos==='right')return 'text-align:right;';
  return 'text-align:left;';
}
function allAnimCSS(){
  return '@keyframes slideLeft{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}'+
  '@keyframes slideRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}'+
  '@keyframes slideBottom{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}'+
  '@keyframes slideTop{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}'+
  '@keyframes fadeIn{from{opacity:0}to{opacity:1}}'+
  '@keyframes expandCenter{from{transform:scaleX(0);opacity:0}to{transform:scaleX(1);opacity:1}}'+
  '@keyframes expandLeft{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0 0 0)}}'+
  '@keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}'+
  '@keyframes zoomIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}'+
  '@keyframes flipX{from{transform:perspective(400px) rotateY(90deg);opacity:0}to{transform:perspective(400px) rotateY(0);opacity:1}}'+
  '@keyframes flipY{from{transform:perspective(400px) rotateX(90deg);opacity:0}to{transform:perspective(400px) rotateX(0);opacity:1}}'+
  '@keyframes wipeLeft{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0 0 0)}}'+
  '@keyframes wipeRight{from{clip-path:inset(0 0 0 100%)}to{clip-path:inset(0 0 0 0)}}'+
  '@keyframes elastic{0%{transform:scaleX(0)}40%{transform:scaleX(1.1)}60%{transform:scaleX(.95)}80%{transform:scaleX(1.02)}100%{transform:scaleX(1)}}'+
  '@keyframes glitch{0%{transform:translate(0);opacity:0}10%{transform:translate(-3px,2px);opacity:1}20%{transform:translate(3px,-1px)}30%{transform:translate(-2px,1px)}40%{transform:translate(2px,-2px)}50%{transform:translate(-1px,2px)}60%{transform:translate(1px,0)}100%{transform:translate(0)}}'+
  '@keyframes tagIn{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}'+
  '@keyframes barIn{from{transform:scaleX(0)}to{transform:scaleX(1)}}'+
  '@keyframes roleIn{from{opacity:0;transform:translateX(-15px)}to{opacity:1;transform:translateX(0)}}'+
  '@keyframes subF{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}';
}
function heightCSS(c){
  if(c.heightMode==='custom')return 'min-height:'+c.customHeight+'px;';
  return '';
}
function genNR(c,noAnim){
  var pos=posCSS(c,'nameRole'),eff=effectCSS(c);
  var hasTag=c.showTag!==false&&c.tag&&c.tag.trim().length>0;
  var ta=c.textAlign||'left';
  var anim=noAnim?'':'animation:'+c.animation+' '+(c.duration||0.6)+'s cubic-bezier(.22,1,.36,1) both;';
  var tagHTML=hasTag?'<div class="tw"><div class="tag">'+esc(c.tag)+'</div></div>':'';
  var tagCSS=hasTag?'.tw{'+tagAlignCSS(c.tagPos||'left')+'}.tag{display:inline-block;background:'+c.tagBg+';color:'+c.tagText+';font-size:'+(c.tagFontSize||14)+'px;font-weight:700;letter-spacing:2px;padding:6px 18px 5px;text-transform:uppercase;'+(c.borderRadius?'border-radius:'+c.borderRadius+'px '+c.borderRadius+'px 0 0;':'')+'}':'';
  var hCSS=heightCSS(c);

function genFilmina(socials,cfg){
  var active=socials.filter(function(s){return s.on});
  if(!active.length)return '';
  var n=active.length,cycle=cfg.showTime+cfg.fadeTime,total=n*cycle;
  var pIn=(cfg.fadeTime/total*100).toFixed(1),pHold=((cfg.fadeTime+cfg.showTime)/total*100).toFixed(1),pOut=(cycle/total*100).toFixed(1);
  var kf='',items='';
  active.forEach(function(s,i){
    kf+='@keyframes r'+i+'{0%{opacity:0;transform:translateY(8px)}'+pIn+'%{opacity:1;transform:translateY(0)}'+pHold+'%{opacity:1;transform:translateY(0)}'+pOut+'%{opacity:0;transform:translateY(-8px)}100%{opacity:0}}\n';
    items+='<div class="it" style="animation:r'+i+' '+total+'s ease infinite '+(i*cycle)+'s">'+SSVG[s.id]+'<span>'+esc(s.handle)+'</span></div>\n';
  });
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:transparent;overflow:hidden;width:1920px;height:1080px}.a{position:fixed;top:'+cfg.top+'px;right:'+cfg.right+'px;font-family:"Montserrat",sans-serif}.it{position:absolute;right:0;top:0;display:flex;align-items:center;gap:10px;padding:7px 16px 7px 12px;border-radius:6px;background:'+hrgba(cfg.bg,cfg.opacity)+';color:'+cfg.text+';font-size:'+cfg.fontSize+'px;font-weight:600;white-space:nowrap;opacity:0;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,.3)}.it svg{width:'+cfg.iconSize+'px;height:'+cfg.iconSize+'px;flex-shrink:0;opacity:.9}'+kf+'</style></head><body><div class="a">'+items+'</div></body></html>';
}

    h+='</div></div>';
  });

  if(S.zocalos.length<8){
    h+='<div class="add-row">';
    h+='<button onclick="addZ(\'nameRole\')">👤 Nombre</button>';
    h+='<button onclick="addZ(\'title\')">📺 Título</button>';

        h+='<button onclick="addFromPreset(\''+p.id+'\')">'+esc(p.name)+'<span class="preset-tag">'+({nameRole:'👤',title:'📺',ticker:'📰'}[p.type]||'')+'</span></button>';

function switchTab(t){

  if(t==='f')startSocialTimer();

// Update config without full re-render (for text fields)
function updC(key,val){
  if(key.startsWith('f_')){var fk=key.slice(2);S.filmCfg[fk]=val;save();if(S.filminaLive)sendFilmina();return}
  if(key.startsWith('m_')){var mk=key.slice(2);S.moscaCfg[mk]=val;save();if(S.moscaLive)sendMosca();return}
  if(key.startsWith('c_')){var ck=key.slice(2);S.clockCfg[ck]=val;save();if(S.clockLive)sendClock();return}
  if(key.startsWith('lv_')){var lk=key.slice(3);S.liveCfg[lk]=val;save();if(S.liveLive)sendLive();return}
  var z=S.zocalos.find(function(x){return x.id===S.editId});
  if(!z)return;
  z.config[key]=val;save();
  var f=document.getElementById('pvFrame');
  if(f)f.srcdoc=genHTML(z);
  if(z.live){
    if(z.type==='ticker') bc.postMessage({action:'updateTicker',text:z.config.text,cfg:z.config});
    else bc.postMessage({action:'show',id:z.id,html:genHTML(z,true)});
  }
}

// Full re-render (for selects, ranges, checkboxes)
function updFull(key,val){
  if(key.startsWith('f_')){var fk=key.slice(2);S.filmCfg[fk]=val;save();if(S.filminaLive)sendFilmina();render();return}
  if(key.startsWith('m_')){var mk=key.slice(2);S.moscaCfg[mk]=val;save();if(S.moscaLive)sendMosca();render();return}
  if(key.startsWith('c_')){var ck=key.slice(2);S.clockCfg[ck]=val;save();if(S.clockLive)sendClock();render();return}
  if(key.startsWith('lv_')){var lk=key.slice(3);S.liveCfg[lk]=val;save();if(S.liveLive)sendLive();render();return}
  var z=S.zocalos.find(function(x){return x.id===S.editId});
  if(!z)return;
  z.config[key]=val;save();
  if(z.live){
    if(z.type==='ticker') bc.postMessage({action:'updateTicker',text:z.config.text,cfg:z.config});
    else bc.postMessage({action:'show',id:z.id,html:genHTML(z,true)});
  }
  render();
}

function toggleNewsAuto(i){

function addCustomNews(){
  var name=document.getElementById('customNewsName').value.trim();
  var url=document.getElementById('customNewsUrl').value.trim();
  if(!name||!url)return;
  S.newsCustomUrls.push({name:name,rss:url,on:true});
  save();autoFetchNews();render();
}

var newsFetchTimer=null;
function autoFetchNews(){
  var sources=S.newsSources.filter(function(s){return s.on});
  S.newsCustomUrls.forEach(function(u){if(u.on!==false)sources.push(u)});
  if(!sources.length)return;
  var z=S.zocalos.find(function(x){return x.id===S.editId&&x.type==='ticker'});
  var headlines=[];var done=0;var total=sources.length;
  sources.forEach(function(src){
    var apiUrl='https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(src.rss);
    fetch(apiUrl).then(function(r){return r.json()}).then(function(data){
      if(data.items){data.items.slice(0,5).forEach(function(item){headlines.push(item.title)})}
      done++;
      if(done>=total&&headlines.length){
        var text=headlines.join(' +++ ');
        if(z){z.config.text=text;save()}
        // Update any live ticker
        S.zocalos.forEach(function(tz){
          if(tz.type==='ticker'&&tz.live){
            tz.config.text=text;
            bc.postMessage({action:'updateTicker',text:text,cfg:tz.config});
          }
        });
        save();
        if(S.tab==='z'&&S.editId)render();
      }
    }).catch(function(){done++;});
  });
}

// Conductor polling - auto-creates zócalos
function pollConductor(){
  fetch('/api/items').then(function(r){return r.json()}).then(function(items){
    if(!items||!items.length)return;
    var changed=false;
    items.forEach(function(item){
      // Check if already processed
      if(S.zocalos.some(function(z){return z.conductorId===item.id}))return;
      if(S.zocalos.length>=8)return;
      // Get preset config or defaults
      var preset=S.defaultPreset?S.presets.find(function(p){return p.id===S.defaultPreset}):null;
      var nz;
      if(item.type==='title'){
        nz={id:uid(),type:'title',config:preset&&preset.type==='title'?JSON.parse(JSON.stringify(preset.config)):makeZ('title'),live:false,conductorId:item.id};
        nz.config.text=item.text||'';nz.config.tag=item.tag||'';nz.config.subtitle=item.subtitle||'';
      } else if(item.type==='nameRole'){
        nz={id:uid(),type:'nameRole',config:preset&&preset.type==='nameRole'?JSON.parse(JSON.stringify(preset.config)):makeZ('nameRole'),live:false,conductorId:item.id};
        nz.config.name=item.name||'';nz.config.role=item.role||'';nz.config.tag=item.tag||'';
      } else {
        nz={id:uid(),type:'title',config:preset&&preset.type==='title'?JSON.parse(JSON.stringify(preset.config)):makeZ('title'),live:false,conductorId:item.id};
        nz.config.text=item.message||'';nz.config.tag='';
      }
      S.zocalos.push(nz);changed=true;
    });
    // Clean up processed items from server
    if(changed){
      save();
      fetch('/api/items',{method:'DELETE'}).catch(function(){});
      if(S.tab==='z'&&!S.editId)render();
    }
  }).catch(function(){});
}
setInterval(pollConductor,3000);
pollConductor();

function setDefaultPreset(id){S.defaultPreset=id||null;save()}
function deletePreset(id){
  if(!confirm('¿Eliminar esta plantilla?'))return;
  S.presets=S.presets.filter(function(p){return p.id!==id});
  if(S.defaultPreset===id)S.defaultPreset=null;
  save();render();
}

// Image picker for mosca (base64)
function pickMoscaImage(idx){
  var input=document.createElement('input');input.type='file';input.accept='image/*';
  input.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      S.moscaItems[idx].url=ev.target.result;S.moscaItems[idx].type='image';
      save();if(S.moscaLive)sendMosca();render();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

// Initial
render();
if(S.filminaAuto&&S.filminaLive)sendFilmina();
startSocialTimer();
// Re-send live states on load (in case overlay was refreshed)
setTimeout(function(){
  S.zocalos.forEach(function(z){
    if(z.live){
      if(z.type==='ticker') bc.postMessage({action:'showTicker',cfg:z.config,text:z.config.text});
      else bc.postMessage({action:'show',id:z.id,html:genHTML(z)});
    }
  });
  if(S.filminaLive)sendFilmina();
  if(S.moscaLive)sendMosca();
  if(S.clockLive)sendClock();
  if(S.liveLive)sendLive();
},500);
</script>
