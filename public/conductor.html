<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3 de Febrero Stream — Conductor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#070e2a;--panel:#0c1838;--border:#162a6a;--blueL:#2b6dd6;--blueB:#4a8eef;--muted:#4466aa;--text:#c8d8f0;--white:#fff;--green:#22aa66;--red:#cc3344}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:40px}
.hdr{padding:20px 20px 14px;text-align:center;border-bottom:1px solid var(--border)}
.hdr h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--blueB),var(--blueL));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{font-size:11px;color:var(--muted);margin-top:4px}
.status{display:inline-block;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:600;margin-top:6px}
.status.ok{background:rgba(34,170,102,.15);color:var(--green)}
.status.err{background:rgba(204,51,68,.15);color:var(--red)}

.section{padding:16px 20px}
.section h2{font-size:13px;font-weight:600;color:var(--blueL);margin-bottom:10px;letter-spacing:.3px}

/* Type selector */
.type-row{display:flex;gap:8px;margin-bottom:14px}
.type-btn{flex:1;padding:10px 6px;border-radius:8px;background:var(--panel);border:2px solid var(--border);color:var(--text);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;transition:.15s}
.type-btn.on{border-color:var(--blueL);color:var(--white);background:#0e2460}

/* Form */
.fld{margin-bottom:12px}
.fld label{display:block;font-size:10px;color:var(--muted);letter-spacing:.6px;font-weight:600;margin-bottom:4px;text-transform:uppercase}
.fld input,.fld textarea{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px 14px;color:#eee;font-size:15px;outline:none;font-family:inherit}
.fld textarea{resize:vertical}
.fld input:focus,.fld textarea:focus{border-color:var(--blueL)}

.btn-send{display:block;width:100%;padding:14px;border-radius:10px;background:linear-gradient(135deg,var(--blueL),#1a3fa0);border:none;color:var(--white);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;transition:transform .1s}
.btn-send:active{transform:scale(.97)}
.btn-send:disabled{opacity:.4;cursor:default}

/* Sent items */
.sent-item{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.sent-item .icon{font-size:16px;margin-top:2px}
.sent-item .info{flex:1}
.sent-item .info .label{font-size:13px;font-weight:600}
.sent-item .info .meta{font-size:10px;color:var(--muted);margin-top:2px}
.sent-item .check{color:var(--green);font-size:14px;margin-top:2px}

.empty{text-align:center;padding:30px;color:var(--muted);font-size:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="hdr">
  <h1>3 de Febrero Stream</h1>
  <p>Panel del conductor</p>
  <div id="status" class="status ok">● Conectado</div>
</div>

<div class="section">
  <h2>Enviar al aire</h2>
  <div class="type-row">
    <button class="type-btn on" onclick="setType('title')" id="tb-title">📺 Título</button>
    <button class="type-btn" onclick="setType('nameRole')" id="tb-nameRole">👤 Nombre</button>
    <button class="type-btn" onclick="setType('message')" id="tb-message">💬 Mensaje</button>
  </div>
  <div id="form"></div>
  <button class="btn-send" onclick="send()" id="btnSend">Enviar al panel</button>
</div>

<div class="section">
  <h2>Enviados</h2>
  <div id="sent"></div>
</div>

<div class="toast" id="toast">✓ Enviado</div>

<script>
var type='title';
var sent=[];

function setType(t){
  type=t;
  document.querySelectorAll('.type-btn').forEach(function(b){b.classList.remove('on')});
  document.getElementById('tb-'+t).classList.add('on');
  renderForm();
}

function renderForm(){
  var f=document.getElementById('form');
  if(type==='title'){
    f.innerHTML='<div class="fld"><label>Etiqueta (opcional)</label><input id="f_tag" placeholder="EN VIVO, EDITORIAL..."></div>'
      +'<div class="fld"><label>Título</label><input id="f_text" placeholder="Título del segmento"></div>'
      +'<div class="fld"><label>Subtítulo (opcional)</label><input id="f_sub" placeholder="Línea secundaria"></div>';
  } else if(type==='nameRole'){
    f.innerHTML='<div class="fld"><label>Etiqueta (opcional)</label><input id="f_tag" placeholder="ENTREVISTA, INVITADO..."></div>'
      +'<div class="fld"><label>Nombre</label><input id="f_name" placeholder="Nombre completo"></div>'
      +'<div class="fld"><label>Cargo / Rol</label><input id="f_role" placeholder="Periodista, Director..."></div>';
  } else {
    f.innerHTML='<div class="fld"><label>Mensaje</label><textarea id="f_msg" rows="3" placeholder="Texto libre para mostrar..."></textarea></div>';
  }
}

function send(){
  var data={type:type};
  if(type==='title'){
    var text=document.getElementById('f_text').value.trim();
    if(!text){alert('Escribí un título');return}
    data.tag=(document.getElementById('f_tag').value||'').trim();
    data.text=text;
    data.subtitle=(document.getElementById('f_sub').value||'').trim();
  } else if(type==='nameRole'){
    var name=document.getElementById('f_name').value.trim();
    if(!name){alert('Escribí un nombre');return}
    data.tag=(document.getElementById('f_tag').value||'').trim();
    data.name=name;
    data.role=(document.getElementById('f_role').value||'').trim();
  } else {
    var msg=document.getElementById('f_msg').value.trim();
    if(!msg){alert('Escribí un mensaje');return}
    data.message=msg;
  }

  document.getElementById('btnSend').disabled=true;
  fetch('/api/items',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
    .then(function(r){return r.json()})
    .then(function(d){
      if(d.ok){
        sent.unshift(d.item);
        renderSent();
        // Clear form
        document.querySelectorAll('#form input, #form textarea').forEach(function(el){el.value=''});
        showToast();
      }
      document.getElementById('btnSend').disabled=false;
    })
    .catch(function(){
      document.getElementById('status').className='status err';
      document.getElementById('status').textContent='✕ Sin conexión';
      document.getElementById('btnSend').disabled=false;
    });
}

function renderSent(){
  var el=document.getElementById('sent');
  if(!sent.length){el.innerHTML='<div class="empty">Nada enviado todavía</div>';return}
  var h='';
  sent.forEach(function(item){
    var icon=item.type==='title'?'📺':item.type==='nameRole'?'👤':'💬';
    var label=item.type==='title'?item.text:item.type==='nameRole'?item.name:item.message;
    var meta=item.type==='title'?(item.tag?item.tag+' · ':'')+item.time:
             item.type==='nameRole'?(item.role?item.role+' · ':'')+item.time:
             item.time;
    h+='<div class="sent-item"><span class="icon">'+icon+'</span><div class="info"><div class="label">'+label+'</div><div class="meta">'+meta+'</div></div><span class="check">✓</span></div>';
  });
  el.innerHTML=h;
}

function showToast(){
  var t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2000);
}

// Check connection
function checkConn(){
  fetch('/api/items').then(function(r){
    if(r.ok){
      document.getElementById('status').className='status ok';
      document.getElementById('status').textContent='● Conectado';
    }
  }).catch(function(){
    document.getElementById('status').className='status err';
    document.getElementById('status').textContent='✕ Sin conexión';
  });
}
setInterval(checkConn,10000);

renderForm();
renderSent();
</script>
</body>
</html>
