<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=DM+Sans:wght@500;600;700&family=Oswald:wght@400;600;700&family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Poppins:wght@400;600;700&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:transparent;overflow:hidden;width:1920px;height:1080px}
.slot{position:fixed;pointer-events:none;opacity:0;transition:opacity .25s ease}
.slot.visible{opacity:1}
.slot iframe{border:none;background:transparent;width:1920px;height:1080px;pointer-events:none}
#filmina{position:fixed;pointer-events:none;font-family:'Montserrat',sans-serif;opacity:0;transition:opacity .3s}
#filmina.on{opacity:1}
#film-el{opacity:0;transition:opacity .4s ease;display:flex;align-items:center;gap:10px;padding:7px 16px 7px 12px;border-radius:6px;font-weight:600;white-space:nowrap;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,.3)}
#film-el.show{opacity:1}
#film-el.shake{animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-3px)}40%{transform:translateX(3px)}60%{transform:translateX(-2px)}80%{transform:translateX(1px)}}
#film-el svg{flex-shrink:0;opacity:.9}
#mosca{position:fixed;pointer-events:none;opacity:0;transition:opacity .3s}
#mosca.on{opacity:1}
#mosca-el{opacity:0;transition:opacity .6s ease}
#mosca-el.show{opacity:1}
#mosca-el img{display:block}
#mosca-el .mosca-text{font-family:'DM Sans',sans-serif;font-weight:700;white-space:nowrap}
#clock{position:fixed;pointer-events:none;font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:.5px;opacity:0;transition:opacity .3s;backdrop-filter:blur(6px);border-radius:4px;padding:4px 12px}
#clock.on{opacity:1}
#live-badge{position:fixed;pointer-events:none;font-family:'DM Sans',sans-serif;opacity:0;transition:opacity .3s;display:flex;align-items:center;gap:6px;padding:5px 14px 5px 10px;border-radius:4px;background:rgba(204,20,20,.9);backdrop-filter:blur(6px)}
#live-badge.on{opacity:1}
.live-dot{width:8px;height:8px;border-radius:50%;background:#ff4444;animation:pulse 1.5s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(255,68,68,.6)}50%{opacity:.7;box-shadow:0 0 0 5px rgba(255,68,68,0)}}
.live-text{font-size:12px;font-weight:700;color:#fff;letter-spacing:1.5px;text-transform:uppercase}
/* Dedicated ticker - not iframe based */
#ticker-wrap{position:fixed;pointer-events:none;opacity:0;transition:opacity .3s;width:100%}
#ticker-wrap.on{opacity:1}
#ticker-line{height:3px}
#ticker-bg{padding:10px 0;overflow:hidden;white-space:nowrap}
#ticker-scroll{display:inline-block;white-space:nowrap;will-change:transform}
</style>
</head>
<body>
<div id="zocalos"></div>
<div id="ticker-wrap"><div id="ticker-line"></div><div id="ticker-bg"><div id="ticker-scroll"></div></div></div>
<div id="filmina"><div id="film-el"></div></div>
<div id="mosca"><div id="mosca-el"></div></div>
<div id="clock"></div>
<div id="live-badge"><span class="live-dot"></span><span class="live-text">EN VIVO</span></div>
<script>
var bc=new BroadcastChannel('3df-stream');
var slots={},activeIds={};
function hrgba(h,a){if(!h||h.length<7)return'rgba(0,0,0,'+a+')';return'rgba('+parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16)+','+a+')'}

var SSVG={
  ig:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919C8.416 2.175 8.796 2.163 12 2.163zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12s.014 3.668.072 4.948c.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24s3.668-.014 4.948-.072c4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948s-.014-3.667-.072-4.947c-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>',
  x:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
  wa:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a10.7 10.7 0 00-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479s1.065 2.875 1.213 3.074c.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>',
  web:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>'
};

// ═══ ZOCALOS — coexisten entre sí ═══
bc.onmessage=function(e){
  var d=e.data;
  if(d.action==='show'){
    // NO hide others — coexist
    if(!slots[d.id]){var el=document.createElement('div');el.className='slot';document.getElementById('zocalos').appendChild(el);slots[d.id]=el}
    slots[d.id].innerHTML='<iframe srcdoc="'+d.html.replace(/"/g,'&quot;')+'"></iframe>';
    void slots[d.id].offsetWidth;slots[d.id].classList.add('visible');activeIds[d.id]=true;
  }
  else if(d.action==='hide'){if(slots[d.id]){slots[d.id].classList.remove('visible');setTimeout(function(){if(slots[d.id])slots[d.id].innerHTML=''},300)}delete activeIds[d.id]}
  else if(d.action==='hideAll'){Object.keys(slots).forEach(function(id){slots[id].classList.remove('visible');setTimeout(function(){slots[id].innerHTML=''},300)});activeIds={};filmStop();moscaStop();stopClock();stopLive();tickerHide()}

  // Dedicated ticker
  else if(d.action==='showTicker')tickerShow(d);
  else if(d.action==='updateTicker')tickerUpdate(d);
  else if(d.action==='hideTicker')tickerHide();

  // Filmina
  else if(d.action==='showFilmina')filmStart(d);
  else if(d.action==='hideFilmina')filmStop();
  else if(d.action==='showMosca')moscaStart(d);
  else if(d.action==='hideMosca')moscaStop();
  else if(d.action==='showClock')startClock(d.cfg);
  else if(d.action==='hideClock')stopClock();
  else if(d.action==='showLive')startLive(d.cfg);
  else if(d.action==='hideLive')stopLive();
  else if(d.action==='updateLive'){
    var el=document.getElementById('live-badge');
    if(d.text)el.querySelector('.live-text').textContent=d.text;
    if(d.bg)el.style.background=d.bg;
    el.classList.add('on');
  }
};

// ═══ TICKER — JS-driven scroll, fluid text updates ═══
var tickerAnim=null,tickerPos=0,tickerSpeed=1;
function tickerShow(d){
  var cfg=d.cfg,text=d.text;
  var wrap=document.getElementById('ticker-wrap');
  var line=document.getElementById('ticker-line');
  var bg=document.getElementById('ticker-bg');
  var scroll=document.getElementById('ticker-scroll');
  // Position
  if(cfg.posY==='top'){wrap.style.top=(cfg.offsetY||0)+'px';wrap.style.bottom='auto'}
  else{wrap.style.bottom=(cfg.offsetY||0)+'px';wrap.style.top='auto'}
  if(cfg.posX==='right'){wrap.style.right=(cfg.offsetX||0)+'px';wrap.style.left='auto';wrap.style.width='auto'}
  else if(cfg.posX==='center'){wrap.style.left='50%';wrap.style.transform='translateX(-50%)';wrap.style.right='auto';wrap.style.width='auto'}
  else{wrap.style.left=(cfg.offsetX||0)+'px';wrap.style.right='auto';wrap.style.width='100%'}
  // Styling
  line.style.background=cfg.accentColor||'#2b6dd6';
  line.style.display=cfg.showAccent!==false?'block':'none';
  bg.style.background=hrgba(cfg.bgColor||'#0d1b3e',cfg.bgOpacity||1);
  bg.style.backdropFilter='blur('+(cfg.backdropBlur||6)+'px)';
  if(cfg.borderRadius){wrap.style.borderRadius=cfg.borderRadius+'px';wrap.style.overflow='hidden'}
  scroll.style.fontFamily='"'+(cfg.font||'Montserrat')+'",sans-serif';
  scroll.style.fontSize=(cfg.tickerFontSize||18)+'px';
  scroll.style.fontWeight='600';
  scroll.style.color=cfg.textColor||'#fff';
  scroll.style.letterSpacing='.4px';
  scroll.textContent=text;
  tickerSpeed=(cfg.speed||30)/1000;
  wrap.classList.add('on');
  if(tickerAnim)cancelAnimationFrame(tickerAnim);tickerPos=1920;tickerAnimate();
}
function tickerUpdate(d){
  var scroll=document.getElementById('ticker-scroll');
  var wrap=document.getElementById('ticker-wrap');
  var bg=document.getElementById('ticker-bg');
  if(d.text)scroll.textContent=d.text;
  if(d.cfg){
    var cfg=d.cfg;
    if(cfg.speed)tickerSpeed=cfg.speed/1000;
    if(cfg.bgColor)bg.style.background=hrgba(cfg.bgColor,cfg.bgOpacity||1);
    if(cfg.textColor)scroll.style.color=cfg.textColor;
    if(cfg.tickerFontSize)scroll.style.fontSize=cfg.tickerFontSize+'px';
    if(cfg.font)scroll.style.fontFamily='"'+cfg.font+'",sans-serif';
    if(cfg.backdropBlur!==undefined)bg.style.backdropFilter='blur('+cfg.backdropBlur+'px)';
    if(cfg.borderRadius!==undefined){wrap.style.borderRadius=cfg.borderRadius+'px';wrap.style.overflow='hidden'}
    if(cfg.posY==='top'){wrap.style.top=(cfg.offsetY||0)+'px';wrap.style.bottom='auto'}
    else if(cfg.posY){wrap.style.bottom=(cfg.offsetY||0)+'px';wrap.style.top='auto'}
    if(cfg.offsetY!==undefined){if(cfg.posY==='top')wrap.style.top=cfg.offsetY+'px';else wrap.style.bottom=cfg.offsetY+'px'}
  }
}
function tickerHide(){
  document.getElementById('ticker-wrap').classList.remove('on');
  if(tickerAnim){cancelAnimationFrame(tickerAnim);tickerAnim=null}
}
function tickerAnimate(){
  var scroll=document.getElementById('ticker-scroll');
  var w=scroll.offsetWidth;
  if(w===0)w=2000;
  tickerPos-=tickerSpeed;
  if(tickerPos<-w)tickerPos=1920;
  scroll.style.transform='translateX('+tickerPos+'px)';
  tickerAnim=requestAnimationFrame(tickerAnimate);
}

// ═══ FILMINA ═══
var film={items:[],cfg:{},on:false,idx:0,timer:null};
function filmStart(data){
  film.items=data.items;film.cfg=data.cfg;film.idx=0;film.on=true;
  var wrap=document.getElementById('filmina');
  wrap.style.top=data.cfg.top+'px';wrap.style.right=data.cfg.right+'px';
  wrap.classList.add('on');filmCycle();
}
function filmStop(){
  film.on=false;if(film.timer)clearTimeout(film.timer);
  document.getElementById('film-el').classList.remove('show','shake');
  document.getElementById('filmina').classList.remove('on');
}
function filmCycle(){
  if(!film.on||!film.items.length)return;
  var cfg=film.cfg,item=film.items[film.idx%film.items.length];
  var el=document.getElementById('film-el');
  var sz=cfg.iconSize||18;
  el.classList.remove('show','shake');
  var svg=(SSVG[item.id]||'').replace(/<svg /,'<svg width="'+sz+'" height="'+sz+'" ');
  el.innerHTML=svg+'<span>'+item.handle+'</span>';
  el.style.background=hrgba(cfg.bg,cfg.opacity);el.style.color=cfg.text;el.style.fontSize=cfg.fontSize+'px';
  film.timer=setTimeout(function(){
    if(!film.on)return;el.classList.add('show');
    film.timer=setTimeout(function(){
      if(!film.on)return;
      if(cfg.shake!==false){el.classList.add('shake');setTimeout(function(){el.classList.remove('shake')},350)}
      film.timer=setTimeout(function(){
        if(!film.on)return;el.classList.remove('show');
        film.timer=setTimeout(function(){film.idx=(film.idx+1)%film.items.length;if(film.on)filmCycle()},500);
      },cfg.shake!==false?500:100);
    },(cfg.showTime||3)*1000);
  },100);
}

// ═══ MOSCA ═══
var mosca={items:[],cfg:{},on:false,idx:0,timer:null};
function moscaStart(data){
  mosca.items=data.items;mosca.cfg=data.cfg;mosca.idx=0;mosca.on=true;
  var wrap=document.getElementById('mosca');
  wrap.style.top=data.cfg.top+'px';wrap.style.right=data.cfg.right+'px';
  wrap.style.width=data.cfg.size+'px';wrap.style.height=data.cfg.size+'px';
  wrap.classList.add('on');moscaShow();
}
function moscaStop(){
  mosca.on=false;if(mosca.timer)clearTimeout(mosca.timer);
  document.getElementById('mosca-el').classList.remove('show');
  document.getElementById('mosca').classList.remove('on');
}
function moscaShow(){
  if(!mosca.on||!mosca.items.length)return;
  var cfg=mosca.cfg,item=mosca.items[mosca.idx%mosca.items.length];
  var el=document.getElementById('mosca-el');
  el.classList.remove('show');
  mosca.timer=setTimeout(function(){
    if(!mosca.on)return;
    if(item.type==='image'&&item.url)el.innerHTML='<img src="'+item.url+'" style="max-width:'+cfg.size+'px;max-height:'+cfg.size+'px;opacity:'+(cfg.opacity||0.7)+'">';
    else el.innerHTML='<div class="mosca-text" style="font-size:'+(cfg.textSize||16)+'px;color:'+(cfg.textColor||'#fff')+';opacity:'+(cfg.opacity||0.7)+'">'+(item.text||'')+'</div>';
    setTimeout(function(){el.classList.add('show')},50);
    if(mosca.items.length>1){mosca.timer=setTimeout(function(){mosca.idx=(mosca.idx+1)%mosca.items.length;if(mosca.on)moscaShow()},(cfg.interval||8)*1000)}
  },700);
}

// ═══ CLOCK ═══
var clockTimer=null;
function startClock(cfg){
  var el=document.getElementById('clock');
  el.style.top=cfg.top+'px';
  if(cfg.posX==='left'){el.style.left=cfg.offsetX+'px';el.style.right='auto'}else{el.style.right=cfg.offsetX+'px';el.style.left='auto'}
  el.style.fontSize=cfg.fontSize+'px';el.style.color=cfg.textColor;el.style.background=hrgba(cfg.bg,cfg.opacity);
  el.classList.add('on');
  function tick(){var n=new Date();el.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')}
  tick();if(clockTimer)clearInterval(clockTimer);clockTimer=setInterval(tick,10000);
}
function stopClock(){if(clockTimer)clearInterval(clockTimer);document.getElementById('clock').classList.remove('on')}

// ═══ LIVE BADGE ═══
function startLive(cfg){
  var el=document.getElementById('live-badge');
  el.style.top=cfg.top+'px';
  if(cfg.posX==='left'){el.style.left=cfg.offsetX+'px';el.style.right='auto'}else{el.style.right=cfg.offsetX+'px';el.style.left='auto'}
  if(cfg.fontSize)el.querySelector('.live-text').style.fontSize=cfg.fontSize+'px';
  if(cfg.bg)el.style.background=cfg.bg;
  if(cfg.text)el.querySelector('.live-text').textContent=cfg.text;
  el.classList.add('on');
}
function stopLive(){document.getElementById('live-badge').classList.remove('on')}
</script>
</body>
</html>
