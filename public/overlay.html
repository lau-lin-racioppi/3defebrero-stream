<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=DM+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:transparent;overflow:hidden;width:1920px;height:1080px}

/* Zocalos */
.slot{position:fixed;pointer-events:none;opacity:0;transition:opacity .2s ease}
.slot.visible{opacity:1}
.slot iframe{border:none;background:transparent;width:1920px;height:1080px;pointer-events:none}

/* Social filmina */
#filmina{position:fixed;pointer-events:none;font-family:'Montserrat',sans-serif;opacity:0;transition:opacity .3s}
#filmina.on{opacity:1}
.soc-el{display:flex;align-items:center;gap:10px;padding:7px 16px 7px 12px;border-radius:6px;font-weight:600;white-space:nowrap;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,.3);position:absolute;right:0;top:0;opacity:0}
.soc-el svg{flex-shrink:0;opacity:.9}
.soc-el.entering{animation:var(--anim-in) var(--dur-in) cubic-bezier(.22,1,.36,1) both}
.soc-el.visible{opacity:1}
.soc-el.shaking{animation:shake .4s ease}
.soc-el.exiting{animation:var(--anim-out) var(--dur-out) ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes slideInRight{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOutRight{from{transform:translateX(0);opacity:1}to{transform:translateX(40px);opacity:0}}
@keyframes slideInUp{from{transform:translateY(15px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideOutUp{from{transform:translateY(0);opacity:1}to{transform:translateY(-15px);opacity:0}}
@keyframes scaleIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes scaleOut{from{transform:scale(1);opacity:1}to{transform:scale(.7);opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-3px)}30%{transform:translateX(3px)}45%{transform:translateX(-2px)}60%{transform:translateX(2px)}75%{transform:translateX(-1px)}90%{transform:translateX(1px)}}

/* Mosca logos */
#mosca{position:fixed;pointer-events:none;opacity:0;transition:opacity .3s}
#mosca.on{opacity:1}
.mosca-item{position:absolute;top:0;right:0;opacity:0;transition:opacity .5s ease}
.mosca-item.visible{opacity:1}
.mosca-item img{display:block;max-height:100%}
.mosca-item .mosca-text{font-family:'DM Sans',sans-serif;font-weight:700;white-space:nowrap}

/* Clock */
#clock{position:fixed;pointer-events:none;font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:.5px;opacity:0;transition:opacity .3s;backdrop-filter:blur(6px);border-radius:4px;padding:4px 12px}
#clock.on{opacity:1}
</style>
</head>
<body>
<div id="zocalos"></div>
<div id="filmina"></div>
<div id="mosca"></div>
<div id="clock"></div>

<script>
var bc=new BroadcastChannel('3df-stream');
var slots={},activeIds={};

// ═══ SOCIAL FILMINA ═══
var filmState={items:[],cfg:{},active:false,idx:0,timer:null,phase:'idle'};
var SSVG={
  ig:'<svg viewBox="0 0 24 24" fill="currentColor" width="W" height="W"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919C8.416 2.175 8.796 2.163 12 2.163zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12s.014 3.668.072 4.948c.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24s3.668-.014 4.948-.072c4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948s-.014-3.667-.072-4.947c-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>',
  x:'<svg viewBox="0 0 24 24" fill="currentColor" width="W" height="W"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
  wa:'<svg viewBox="0 0 24 24" fill="currentColor" width="W" height="W"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a10.7 10.7 0 00-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479s1.065 2.875 1.213 3.074c.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>',
  web:'<svg viewBox="0 0 24 24" fill="currentColor" width="W" height="W"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>'
};
function hrgba(h,a){if(!h||h.length<7)return'rgba(0,0,0,'+a+')';return'rgba('+parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16)+','+a+')'}

function buildFilmina(data){
  filmState.items=data.items;filmState.cfg=data.cfg;filmState.idx=0;
  var el=document.getElementById('filmina');
  el.style.top=data.cfg.top+'px';el.style.right=data.cfg.right+'px';
  el.classList.add('on');filmState.active=true;
  showNextSocial();
}
function stopFilmina(){
  filmState.active=false;
  if(filmState.timer)clearTimeout(filmState.timer);
  var el=document.getElementById('filmina');el.classList.remove('on');el.innerHTML='';
}
function showNextSocial(){
  if(!filmState.active||!filmState.items.length)return;
  var cfg=filmState.cfg,item=filmState.items[filmState.idx%filmState.items.length];
  var el=document.getElementById('filmina');
  var sz=cfg.iconSize||18;
  var svg=(SSVG[item.id]||'').replace(/W/g,sz);
  var animIn=cfg.animIn||'slideInUp',animOut=cfg.animOut||'slideOutUp';
  var durIn=(cfg.durIn||0.4)+'s',durOut=(cfg.durOut||0.3)+'s';

  el.innerHTML='<div class="soc-el entering" style="background:'+hrgba(cfg.bg,cfg.opacity)+';color:'+cfg.text+';font-size:'+cfg.fontSize+'px;--anim-in:'+animIn+';--dur-in:'+durIn+';--anim-out:'+animOut+';--dur-out:'+durOut+'">'+svg+'<span>'+item.handle+'</span></div>';

  // After enter animation: visible
  setTimeout(function(){
    var d=el.querySelector('.soc-el');if(!d)return;
    d.classList.remove('entering');d.classList.add('visible');
    // Shake before exit
    filmState.timer=setTimeout(function(){
      if(!d)return;
      if(cfg.shake){d.classList.add('shaking');setTimeout(function(){d.classList.remove('shaking')},400)}
      // Exit
      var exitDelay=cfg.shake?500:0;
      setTimeout(function(){
        if(!d)return;d.classList.remove('visible');d.classList.add('exiting');
        setTimeout(function(){
          filmState.idx=(filmState.idx+1)%filmState.items.length;
          if(filmState.active)showNextSocial();
        },(cfg.durOut||0.3)*1000+50);
      },exitDelay);
    },(cfg.showTime||3)*1000);
  },(cfg.durIn||0.4)*1000+50);
}

// ═══ MOSCA LOGOS ═══
var moscaState={items:[],idx:0,active:false,timer:null};
function buildMosca(data){
  moscaState.items=data.items;moscaState.idx=0;
  var el=document.getElementById('mosca');
  el.style.top=data.cfg.top+'px';
  el.style.right=data.cfg.right+'px';
  el.style.width=data.cfg.size+'px';el.style.height=data.cfg.size+'px';
  el.classList.add('on');moscaState.active=true;moscaState.cfg=data.cfg;
  showMoscaItem();
}
function stopMosca(){
  moscaState.active=false;if(moscaState.timer)clearTimeout(moscaState.timer);
  document.getElementById('mosca').classList.remove('on');document.getElementById('mosca').innerHTML='';
}
function showMoscaItem(){
  if(!moscaState.active||!moscaState.items.length)return;
  var el=document.getElementById('mosca');
  var item=moscaState.items[moscaState.idx%moscaState.items.length];
  var cfg=moscaState.cfg;
  // Clear old
  el.querySelectorAll('.mosca-item.visible').forEach(function(d){d.classList.remove('visible');setTimeout(function(){d.remove()},600)});
  // Build new
  var div=document.createElement('div');div.className='mosca-item';
  if(item.type==='image'&&item.url){div.innerHTML='<img src="'+item.url+'" style="max-width:'+cfg.size+'px;max-height:'+cfg.size+'px;opacity:'+(cfg.opacity||0.7)+'">';}
  else{div.innerHTML='<div class="mosca-text" style="font-size:'+(cfg.textSize||16)+'px;color:'+(cfg.textColor||'#ffffff')+';opacity:'+(cfg.opacity||0.7)+'">'+item.text+'</div>';}
  el.appendChild(div);
  setTimeout(function(){div.classList.add('visible')},50);
  // Next
  if(moscaState.items.length>1){
    moscaState.timer=setTimeout(function(){
      moscaState.idx=(moscaState.idx+1)%moscaState.items.length;
      if(moscaState.active)showMoscaItem();
    },(cfg.interval||8)*1000);
  }
}

// ═══ CLOCK ═══
var clockTimer=null;
function startClock(cfg){
  var el=document.getElementById('clock');
  el.style.top=cfg.top+'px';
  if(cfg.posX==='left'){el.style.left=cfg.offsetX+'px';el.style.right='auto';}
  else{el.style.right=cfg.offsetX+'px';el.style.left='auto';}
  el.style.fontSize=cfg.fontSize+'px';
  el.style.color=cfg.textColor;
  el.style.background=hrgba(cfg.bg,cfg.opacity);
  el.classList.add('on');
  function tick(){
    var now=new Date();
    var h=String(now.getHours()).padStart(2,'0');
    var m=String(now.getMinutes()).padStart(2,'0');
    el.textContent=h+':'+m;
  }
  tick();clockTimer=setInterval(tick,10000);
}
function stopClock(){
  if(clockTimer)clearInterval(clockTimer);
  document.getElementById('clock').classList.remove('on');
}

// ═══ MESSAGE HANDLER ═══
bc.onmessage=function(e){
  var d=e.data;
  if(d.action==='show'){
    Object.keys(activeIds).forEach(function(id){if(id!==d.id&&slots[id]){slots[id].classList.remove('visible');setTimeout(function(){if(slots[id])slots[id].innerHTML=''},300);delete activeIds[id]}});
    if(!slots[d.id]){var el=document.createElement('div');el.className='slot';document.getElementById('zocalos').appendChild(el);slots[d.id]=el}
    slots[d.id].innerHTML='<iframe srcdoc="'+d.html.replace(/"/g,'&quot;')+'"></iframe>';
    void slots[d.id].offsetWidth;slots[d.id].classList.add('visible');activeIds[d.id]=true;
  }
  else if(d.action==='hide'){if(slots[d.id]){slots[d.id].classList.remove('visible');setTimeout(function(){if(slots[d.id])slots[d.id].innerHTML=''},300)}delete activeIds[d.id]}
  else if(d.action==='hideAll'){Object.keys(slots).forEach(function(id){slots[id].classList.remove('visible');setTimeout(function(){slots[id].innerHTML=''},300)});activeIds={};stopFilmina();stopMosca();stopClock()}
  else if(d.action==='showFilmina')buildFilmina(d);
  else if(d.action==='hideFilmina')stopFilmina();
  else if(d.action==='showMosca')buildMosca(d);
  else if(d.action==='hideMosca')stopMosca();
  else if(d.action==='showClock')startClock(d.cfg);
  else if(d.action==='hideClock')stopClock();
};
</script>
</body>
</html>
